        function renderPosts(posts) {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            if (posts.length === 0) {
                container.innerHTML = '<div class="no-results">🔍 ရှာဖွေချက်နှင့် ကိုက်ညီသည့် ပို့စ် မတွေ့ပါ။</div>';
                return;
            }

            posts.forEach(post => {
                const card = document.createElement('a');
                card.className = 'post-card';
                card.href = post.link;

                let imgHtml = '';
                if (post.image) {
                    imgHtml = `<img src="${post.image}" class="card-img" alt="${post.title}" loading="lazy">`;
                } else {
                    imgHtml = `<div class="card-img-placeholder">📖</div>`;
                }

                card.innerHTML = `
                    ${imgHtml}
                    <div class="card-content">
                        <div class="card-meta">📅 ${post.date} • ✍️ ${post.author}</div>
                        <div class="card-title">${post.title}</div>
                        <div class="card-excerpt">${post.excerpt}</div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            if (!query) {
                renderPosts(allPosts);
                return;
            }
            const filtered = allPosts.filter(p =>
                (p.title && p.title.toLowerCase().includes(query)) ||
                (p.author && p.author.toLowerCase().includes(query)) ||
                (p.excerpt && p.excerpt.toLowerCase().includes(query))
            );
            renderPosts(filtered);
        });

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{POST_TITLE}} - Whisper Of Words Book Reviews</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            line-height: 2;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #d84315 0%, #bf360c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .post-meta {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .post-image {
            width: 100%;
            height: auto;
            display: block;
            max-height: 600px;
            object-fit: contain;
            background: #f9f9f9;
        }

        .post-body {
            padding: 40px 50px;
        }

        .post-body p {
            margin-bottom: 1.5em;
            text-align: justify;
            letter-spacing: 0.02em;
            word-spacing: 0.02em;
            font-size: 1.02rem;
            line-height: 2;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #d84315;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }

        .reviewer-credit {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: center;
            color: #888;
            font-style: italic;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; }
            .post-body { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{POST_TITLE}}</h1>
            <div class="post-meta">📅 {{POST_DATE}} • ✍️ {{POST_AUTHOR}}</div>
        </header>

        <img src="{{POST_IMAGE}}" alt="{{POST_TITLE}}" class="post-image">

        <div class="post-body">
            <div class="post-content">
                {{POST_CONTENT}}
            </div>

            <div class="reviewer-credit">
                <p>Review By {{POST_AUTHOR}}</p>
                <p><a href="{{SOURCE_URL}}" target="_blank" style="color: #d84315;">မူရင်းကို ဖတ်ရန် →</a></p>
            </div>

            <a href="../index.html" class="back-link">← ပင်မစာမျက်နှာသို့</a>
        </div>
    </div>
</body>
</html>

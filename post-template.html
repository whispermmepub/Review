<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{POST_TITLE}} - 𝐖𝐡𝐢𝐬𝐩𝐞𝐫 𝐎𝐟 𝐖𝐨𝐫𝐝𝐬 - 𝐦𝐦 𝐄𝐩𝐮𝐛</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            line-height: 2;
            padding: 10px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #d84315 0%, #bf360c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .post-meta {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .post-image {
            width: 100%;
            height: auto;
            display: block;
            max-height: 600px;
            object-fit: contain;
            background: #f9f9f9;
        }

        .post-body {
            padding: 40px 60px;
        }

        .post-body p {
            margin-bottom: 1.5em;
            text-align: left;
            letter-spacing: 0.03em;
            word-spacing: 0.03em;
            font-size: 0.95rem;
            line-height: 2.1;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 0;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.82em;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }
        .social-link.facebook { color: #ffffff; background: #1877f2; border: 1px solid #1877f2; }
        .social-link.facebook:hover { background: #1877f2; box-shadow: 0 4px 12px rgba(24,119,242,0.4); transform: translateY(-2px); }
        .social-link.youtube { color: #ffffff; background: #ff0000; border: 1px solid #ff0000; }
        .social-link.youtube:hover { background: #ff0000; box-shadow: 0 4px 12px rgba(255,0,0,0.4); transform: translateY(-2px); }
        .social-link.twitter { color: #ffffff; background: #ffffff; border: 1px solid #ffffff; }
        .social-link.twitter:hover { background: #ffffff; color: #000000; box-shadow: 0 4px 12px rgba(255,255,255,0.2); transform: translateY(-2px); }
        .social-link.telegram { color: #ffffff; background: #0088cc; border: 1px solid #0088cc; }
        .social-link.telegram:hover { background: #0088cc; box-shadow: 0 4px 12px rgba(0,136,204,0.4); transform: translateY(-2px); }
        .social-icon { width: 18px; height: 18px; fill: currentColor; }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #d84315;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }

        .reviewer-credit {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: center;
            color: #888;
            font-style: italic;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; }
            .post-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>

            <div class="post-meta">📅 {{POST_DATE}} • ✍️ {{POST_AUTHOR}}</div>

        <img src="{{POST_IMAGE}}" alt="{{POST_TITLE}}" class="post-image">

            <div class="reviewer-credit">
